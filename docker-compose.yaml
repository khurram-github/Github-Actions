services:
  app:
    image: YOUR_REAL_DOCKERHUB_USERNAME/express-app:latest
    ports:
      - 3000:3000
    restart: unless-stopped

  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
    restart: unless-stopped