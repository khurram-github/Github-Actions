services:
  app:
    # IMPORTANT: Replace with your actual Docker Hub username and image name
    image: codexmodex/app:latest
    ports:
      - "8080:8080" # Update the published port if your Express app uses a different one
    container_name: express_app

  watchtower:
    image: nickfedor/watchtower # The image specified in the course material
    environment:
      - WATCHTOWER_POLL_INTERVAL=60 # Poll Docker Hub every 60 seconds
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: watchtower
